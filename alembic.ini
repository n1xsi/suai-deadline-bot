# Конфигурация Alembic для управления миграциями базы данных.
# URL к базе данных здесь намеренно НЕ задаётся - он подставляется динамически в alembic/env.py из переменной DB_PATH (см. src/config.py).

[alembic]
# Путь к каталогу с окружением миграций
script_location = alembic

# Шаблон имени файла новой миграции (с датой для читаемости истории)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Часовой пояс для меток времени в миграциях
timezone = Europe/Moscow

# Добавляет корень проекта в sys.path, чтобы работали импорты src.*
prepend_sys_path = .

# URL подставляется в env.py, поэтому строка оставлена пустой
sqlalchemy.url =


# Логирование
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
